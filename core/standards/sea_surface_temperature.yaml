qc:
  glos:
    name: GLOS Seagull
    summary: QARTOD tests that GLOS uses for Seagull data
    description: QARTOD tests that GLOS uses for sea surface temperature data on Seagull.
    tests:
      qartod:
        # flat_line_test:
        #   fail_threshold: 4
        #   suspect_threshold: 2
        #   tolerance: 0.1
        gross_range_test:
          fail_span:
          - 268.15
          - 323.15
          suspect_span:
          - 273.15
          - 308.15
        rate_of_change_test:
          threshold: 1.5
        spike_test:
          fail_threshold: 2
          suspect_threshold: 1
