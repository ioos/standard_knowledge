qc:
  glos:

    name: GLOS Seagull
    summary: QARTOD tests that GLOS uses for Seagull data
    description: |
       QARTOD tests that GLOS uses for wind direction data on Seagull.
    tests:
      qartod:
        # flat_line_test:
        #   fail_threshold: 6
        #   suspect_threshold: 2
        #   tolerance: 0.1
        gross_range_test:
          fail_span:
          - 0
          - 360
          suspect_span:
          - 0
          - 360
        rate_of_change_test:
          threshold: 360
        spike_test:
          fail_threshold: 360
          suspect_threshold: 360
