name: Rust

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Output rust version for educational purposes
      run: rustup --version
    - name: Cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      id: run-tests
      run: cargo test --verbose --no-default-features
      continue-on-error: true
    - name: Dump test fixtures on failure  --no-default-features
      if: steps.run-tests.outcome == 'failure'
      run: TRYCMD=dump cargo test --verbose  --no-default-features
      continue-on-error: true
    - name: Upload updated fixtures
      if: steps.run-tests.outcome == 'failure'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: updated-test-fixtures
        path: cli/tests/cmd/
    - name: Fail if tests failed
      if: steps.run-tests.outcome == 'failure'
      run: exit 1
    - name: Test publishing to crates.io
      run: cargo publish --workspace --dry-run

  upload_crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC trusted-publishing token for crates.io
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - run: cargo publish --workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
